<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Test</title>
<style>
  body { background: #0a0c0f; color: #e2e8f0; font-family: monospace; padding: 40px; }
  .box { background: #111318; border: 1px solid #1e2330; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .log { font-size: 0.85rem; line-height: 1.8; }
  .ok  { color: #00e5a0; }
  .err { color: #ff4d6a; }
  .info{ color: #ffcc00; }
  button { background: #00e5a0; color: #0a0c0f; border: none; padding: 10px 20px;
           border-radius: 6px; font-family: monospace; font-weight: 700; cursor: pointer; margin-right: 8px; }
</style>
</head>
<body>

<div class="box">
  <div style="font-size:1.1rem;font-weight:700;margin-bottom:16px;">🔥 Firebase Connection Test</div>
  <button onclick="runTest()">Run Test</button>
  <button onclick="testWrite()">Test Write</button>
  <button onclick="testRead()">Test Read</button>
</div>

<div class="box">
  <div class="log" id="log">Waiting — click Run Test to begin...<br></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCgV77MbarV1td4BU7s3m4wHfloVtt17hk",
    authDomain: "dsdashboard-1f801.firebaseapp.com",
    databaseURL: "https://dsdashboard-1f801-default-rtdb.firebaseio.com",
    projectId: "dsdashboard-1f801",
    storageBucket: "dsdashboard-1f801.firebasestorage.app",
    messagingSenderId: "603064397361",
    appId: "1:603064397361:web:20881938008de687fcef10"
  };

  function log(msg, type = 'info') {
    const el = document.getElementById('log');
    el.innerHTML += `<span class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
  }

  let db;

  try {
    log('Initializing Firebase app...', 'info');
    const app = initializeApp(firebaseConfig);
    log('✓ Firebase app initialized', 'ok');

    db = getDatabase(app);
    log('✓ Realtime Database instance created', 'ok');
    log('✓ Database URL: https://dsdashboard-1f801-default-rtdb.firebaseio.com', 'ok');
  } catch(e) {
    log('✗ Firebase init failed: ' + e.message, 'err');
  }

  window.runTest = async () => {
    document.getElementById('log').innerHTML = '';
    log('Starting full test...', 'info');

    // Step 1: Init check
    if (!db) { log('✗ Database not initialized', 'err'); return; }
    log('✓ Database ready', 'ok');

    // Step 2: Write
    try {
      log('Writing test data...', 'info');
      await set(ref(db, 'test'), { value: 'hello', ts: Date.now() });
      log('✓ Write successful', 'ok');
    } catch(e) {
      log('✗ Write failed: ' + e.message, 'err');
      log('Error code: ' + e.code, 'err');
      return;
    }

    // Step 3: Read back
    try {
      log('Reading test data back...', 'info');
      const snap = await get(ref(db, 'test'));
      const val = snap.val();
      log('✓ Read successful: ' + JSON.stringify(val), 'ok');
    } catch(e) {
      log('✗ Read failed: ' + e.message, 'err');
      log('Error code: ' + e.code, 'err');
    }

    // Step 4: Tracker path
    try {
      log('Testing tracker path...', 'info');
      const snap = await get(ref(db, 'tracker'));
      log('✓ Tracker path accessible. Data: ' + JSON.stringify(snap.val()), 'ok');
    } catch(e) {
      log('✗ Tracker path failed: ' + e.message, 'err');
    }
  };

  window.testWrite = async () => {
    try {
      log('Manual write test...', 'info');
      await set(ref(db, 'tracker/EURUSD'), { status: 'monitoring', note: 'test note', updated: 'now' });
      log('✓ Write to tracker/EURUSD successful', 'ok');
    } catch(e) {
      log('✗ Write failed: ' + e.message + ' | code: ' + e.code, 'err');
    }
  };

  window.testRead = async () => {
    try {
      log('Manual read test...', 'info');
      const snap = await get(ref(db, 'tracker'));
      log('✓ Read result: ' + JSON.stringify(snap.val()), 'ok');
    } catch(e) {
      log('✗ Read failed: ' + e.message + ' | code: ' + e.code, 'err');
    }
  };
</script>
</body>
</html>
